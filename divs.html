<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic Div List</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .flex-container { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap; 
            border: 2px solid black; 
            padding: 10px;
            gap: 10px; 
        }
        .divlist { 
            border: 1px solid blue; 
            padding: 10px; 
            background-color: lightcyan; 
        }
    </style>
</head>
<body>

    <div class="container mt-4">
        <h1>Yeshwanth Reddy Kottam builds list with divs</h1>

        <input type="text" id="userInput" placeholder="Enter text here">
        
        <button class="btn btn-primary" onclick="addEnd()">Add end</button>
        <button class="btn btn-secondary" onclick="addFront()">Add front</button>
        <button class="btn btn-danger" onclick="remove()">Remove</button>
        <button class="btn btn-warning" onclick="shuffle()">Shuffle</button>

        <div class="flex-container mt-3" id="target">
            <div class="divlist">Item 1</div>
            <div class="divlist">Item 2</div>
        </div>
    </div>

    <script>
        function addEnd() {
            let inputVal = document.getElementById("userInput").value;
            let newDiv = document.createElement("div");
            newDiv.innerHTML = inputVal;
            newDiv.className = "divlist";
            document.getElementById("target").appendChild(newDiv);
            document.getElementById("userInput").value = "";
        }

        function remove() {
            let divListItems = document.getElementsByClassName("divlist");
            let len = divListItems.length;
            if (len > 1) {
                divListItems[1].remove(); 
            } else if (len === 1) {
                divListItems[0].remove();
            }
        }

        function addFront() {
            let inputVal = document.getElementById("userInput").value;
            let newDiv = document.createElement("div");
            newDiv.innerHTML = inputVal;
            newDiv.className = "divlist";
            let container = document.getElementById("target");
            container.insertBefore(newDiv, container.firstChild);
            document.getElementById("userInput").value = "";
        }

        // Bonus: Shuffle logic to swap two random items
        function shuffle() {
            let items = document.getElementsByClassName("divlist");
            if (items.length < 2) return;
            
            // Randomly pick two indices
            let i = Math.floor(Math.random() * items.length);
            let j = Math.floor(Math.random() * items.length);
            
            // Swap innerHTML
            let temp = items[i].innerHTML;
            items[i].innerHTML = items[j].innerHTML;
            items[j].innerHTML = temp;
        }
    </script>
</body>
</html>
