<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic Div List</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ensuring the container uses flexbox correctly */
        .flex-container { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap; 
            border: 2px solid black; 
            padding: 10px;
            gap: 10px; /* Adds space between items */
        }
        .divlist { 
            border: 1px solid blue; 
            padding: 10px; 
            background-color: lightcyan; 
        }
    </style>
</head>
<body>

    <div class="container mt-4">
        <h1>Yeshwanth Reddy Kottam builds list with divs</h1>

        <input type="text" id="userInput" placeholder="Enter text here">
        <button class="btn btn-primary" onclick="addEnd()">Add end</button>

        <div class="flex-container mt-3" id="target">
            <div class="divlist">Item 1</div>
            <div class="divlist">Item 2</div>
        </div>
    </div>

    <script>
        function addEnd() {
            // 1. Get the value from the input
            let inputVal = document.getElementById("userInput").value;
            
            // 2. Create the new div
            let newDiv = document.createElement("div");
            newDiv.innerHTML = inputVal;
            
            // 3. Set the class for styling
            newDiv.className = "divlist";
            
            // 4. Append to the container
            document.getElementById("target").appendChild(newDiv);
            
            // Optional: Clear input after adding
            document.getElementById("userInput").value = "";
        }
    </script>
</body>
</html>
