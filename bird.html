<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bird Hunt Exploration</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body { padding: 20px; background-color: #f8f9fa; }
    .status-box { margin-bottom: 10px; font-weight: bold; }
    #help-report { color: blue; font-style: italic; min-height: 40px; }
    .game-img { width: 100px; height: 100px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; margin: 2px; }
    .grid-row { display: flex; justify-content: center; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="container mt-3 text-center">
    <h1 class="bg-primary text-white p-3 rounded shadow">Yeshwanth Reddy Kottam Bird Hunt</h1>

    <div class="alert alert-info shadow-sm mt-4">
      Click on the locations to find the birds, watch out for the forbidden statue.
    </div>

    <div class="row text-center mb-3">
        <div class="col"><p id="locations" class="status-box text-secondary">Number of locations checked is zero.</p></div>
        <div class="col"><p id="score" class="status-box text-success">Score is zero.</p></div>
    </div>

    <div class="text-center mb-3">
        <button class="btn btn-warning shadow-sm" onclick="help()">Click for help.</button>
        <p id="help-report" class="border p-2 bg-white rounded shadow-sm mt-2 mx-auto" style="max-width: 400px;">Help report</p>
    </div>

    <div id="game-field" class="container mt-4">
        </div>

  </div>

  <script>
    var ids = [];
    var checkCount = 0;
    var penalty = 0;
    var lastCheck = 0;
    var mouseLocation = 18; // Toucan Location
    var catLocation = 20;   // Statue Location
    var gameOver = false;

    const field = document.getElementById('game-field');

    // Requirement: Create 5 rows using divs as containers
    for (let r = 0; r < 5; r++) {
        let rowDiv = document.createElement('div');
        rowDiv.className = "grid-row"; 
        
        // Requirement: Add 7 locations (divs) in each row
        for (let c = 0; c < 7; c++) {
            let position = (r * 7) + c;
            let id = "img" + position;
            ids.push(id);
            
            let colDiv = document.createElement('div');
            
            let img = document.createElement('img');
            img.src = "bush.jpg"; 
            img.id = id;
            img.className = "game-img";
            img.alt = "bush";
            img.onclick = function() { check(position); };
            
            colDiv.appendChild(img);
            rowDiv.appendChild(colDiv);
        }
        field.appendChild(rowDiv);
    }

    function check(position) {
        if(gameOver) return;

        let id = ids[position];
        let imageElement = document.getElementById(id);

        if(position === mouseLocation) {
            imageElement.src = "toucan.jpg"; 
            gameOver = true;
            penalty -= 3;
        } else if (position === catLocation) {
            imageElement.src = "statue.jpg"; 
            gameOver = true;
            penalty += 4;
        } else {
            imageElement.src = "bush.jpg"; 
        }

        checkCount++;
        penalty++;
        lastCheck = position;

        document.getElementById("locations").innerHTML = "Number of locations checked is " + checkCount + ".";
        document.getElementById("score").innerHTML = "Score is " + penalty + ".";
    }

    function help() {
        let row_mouse = Math.floor(mouseLocation / 7);
        let col_mouse = mouseLocation % 7;
        let row_last = Math.floor(lastCheck / 7);
        let col_last = lastCheck % 7;
        let row_cat = Math.floor(catLocation / 7);
        let col_cat = catLocation % 7;

        let helpElement = document.getElementById("help-report");

        if (Math.abs(row_last - row_cat) <= 1 && Math.abs(col_last - col_cat) <= 1) {
            helpElement.innerHTML = "so squeaky";
        } 
        else if (Math.abs(row_last - row_mouse) <= 1 && Math.abs(col_last - col_mouse) <= 1) {
            helpElement.innerHTML = "can fly";
        } 
        else {
            helpElement.innerHTML = "sorry, no help available";
        }
        
        penalty += 2;
        document.getElementById("score").innerHTML = "Score is " + penalty + ".";
    }
  </script>
</body>
</html>
