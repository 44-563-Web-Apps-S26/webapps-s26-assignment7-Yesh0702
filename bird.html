<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bird Hunt Exploration</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f8f9fa; }
    .status-box { margin-bottom: 10px; font-weight: bold; }
    #help-report { color: blue; font-style: italic; min-height: 40px; }
    .game-img { width: 100px; height: 100px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; margin: 2px; }
    .grid-row { display: flex; justify-content: center; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="container mt-3 text-center">
    <h1 class="bg-primary text-white p-3 rounded shadow">Yeshwanth Reddy Kottam Bird Hunt</h1>

    <div class="alert alert-info shadow-sm mt-4">
      Click on the locations to find the birds, watch out for the forbidden statue.
    </div>

    <div class="row text-center mb-3">
        <div class="col"><p id="locations" class="status-box text-secondary">Locations Visited: 0</p></div>
        <div class="col"><p id="score" class="status-box text-success">Score: 0</p></div>
    </div>

    <div class="text-center mb-3">
        <button class="btn btn-warning shadow-sm" onclick="help()">Click for help.</button>
        <p id="help-report" class="border p-2 bg-white rounded shadow-sm mt-2 mx-auto" style="max-width: 400px;">Help report</p>
    </div>

    <div id="game-field" class="container mt-4"></div>
  </div>

  <script>
    // Bonus: Randomized Locations
    var ids = [];
    var score = 0;
    var locationsVisited = 0;
    var lastLocation = 0;
    var statueLocation = Math.floor(Math.random() * 35);
    var toucanLocation = Math.floor(Math.random() * 35);
    var lorikeetLocations = [Math.floor(Math.random() * 35), Math.floor(Math.random() * 35)];
    var buntingLocations = [Math.floor(Math.random() * 35), Math.floor(Math.random() * 35), Math.floor(Math.random() * 35), Math.floor(Math.random() * 35), Math.floor(Math.random() * 35)];
    var gameOver = false;

    const field = document.getElementById('game-field');

    for (let i = 0; i < 35; i++) { ids.push("img" + i); }

    for (let r = 0; r < 5; r++) {
        let rowDiv = document.createElement('div');
        rowDiv.className = "grid-row"; 
        for (let c = 0; c < 7; c++) {
            let position = (r * 7) + c;
            let img = document.createElement('img');
            img.src = "bush.jpg"; 
            img.id = ids[position];
            img.className = "game-img";
            img.onclick = function() { check(position); };
            rowDiv.appendChild(img);
        }
        field.appendChild(rowDiv);
    }

    // Toucan Movement Logic
    function moveToucan() {
        let directions = [-7, 7, -1, 1]; // North, South, West, East
        let move = directions[Math.floor(Math.random() * directions.length)];
        let newPos = toucanLocation + move;
        
        // Boundary Check
        if (newPos >= 0 && newPos < 35) {
            toucanLocation = newPos;
        } else {
            moveToucan(); // Try again if move is out of bounds
        }
    }

    function check(position) {
        if(gameOver) return;

        moveToucan(); // Toucan moves on every click

        let id = ids[position];
        let imageElement = document.getElementById(id);

        if(position === statueLocation) {
            imageElement.src = "statue.jpg";
            score -= 3;
            gameOver = true;
        } else if (position === toucanLocation) {
            imageElement.src = "toucan.jpg";
            score += 5;
            gameOver = true; // Ends game when toucan lands on player
        } else if (lorikeetLocations.includes(position)) {
            imageElement.src = "lorikeet.jpg";
            score += 3;
        } else if (buntingLocations.includes(position)) {
            imageElement.src = "bunting.jpg";
            score += 1;
        } else {
            imageElement.src = "bush.jpg";
        }

        locationsVisited++;
        lastLocation = position;

        document.getElementById("locations").innerHTML = "Locations Visited: " + locationsVisited;
        document.getElementById("score").innerHTML = "Score: " + score;
    }

    function help() {
        // ... (Keep your existing help logic)
    }
  </script>
</body>
</html>
