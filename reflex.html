<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reflex Timer Game</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px; text-align: center; background-color: #f4f7f6; }
        .display-box { font-size: 2rem; margin: 20px; padding: 20px; border-radius: 10px; background: white; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-custom { padding: 15px 40px; font-size: 1.2rem; margin: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="mb-4">Yeshwanth Reddy Kottam reflexes</h1>

        <div id="target" class="display-box border">Your time</div>
        <div id="counter" class="display-box border">Count</div>

        <button type="button" class="btn btn-success btn-custom" onclick="startTime()">Go</button>
        <button type="button" class="btn btn-danger btn-custom" id="haltButton">Halt</button>
    </div>

    <script>
        // 5a: Variable to record when halt is pressed
        var haltTime = undefined;

        // 5b: Function to record the exact millisecond of the click
        function recordTime() {
            haltTime = Date.now();
            console.log("Halt Time Captured: " + haltTime);
        }

        // 5c: Set the onclick property for the halt button
        document.getElementById("haltButton").onclick = recordTime;

        // Placeholder for the Go button logic in the next steps
        function startTime() {
            console.log("Countdown started...");
        }
    </script>

</body>
</html>
