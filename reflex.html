<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reflex Timer Game</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px; text-align: center; background-color: #f4f7f6; }
        .display-box { font-size: 2rem; margin: 20px; padding: 20px; border-radius: 10px; background: white; border: 1px solid #ccc; }
        .btn-custom { padding: 15px 40px; font-size: 1.2rem; margin: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="mb-4">Yeshwanth Reddy Kottam reflexes</h1>

        <div id="target" class="display-box">Your time</div>
        <div id="counter" class="display-box">Count</div>

        <button type="button" class="btn btn-success btn-custom" onclick="beginTime()">Go</button>
        <button type="button" class="btn btn-danger btn-custom" id="haltButton">Halt</button>
    </div>

    <script>
        var haltTime = undefined;

        function recordTime() {
            haltTime = Date.now();
            console.log("Halt Time Captured: " + haltTime);
        }

        document.getElementById("haltButton").onclick = recordTime;

        // Part 6: Function to handle countdown and reflex check
        function beginTime() {
            haltTime = undefined; // Reset for a new attempt

            // Loop to invoke setTimeout 6 times (i=0 to 5)
            for (let i = 0; i < 6; i++) {
                setTimeout(function() {
                    // Update element with id 'counter' to current i
                    document.getElementById("counter").innerHTML = i;
                }, (5 - i) * 1000); // Wait (5-i) seconds
            }

            // Final check after 5000 milliseconds
            setTimeout(function() {
                if (haltTime === undefined) {
                    document.getElementById("target").innerHTML = "Not soon enough";
                } else {
                    let targetTime = Date.now();
                    let elapsed = targetTime - haltTime;
                    document.getElementById("target").innerHTML = "Time was " + elapsed;
                }
            }, 5000);
        }
    </script>

</body>
</html>
