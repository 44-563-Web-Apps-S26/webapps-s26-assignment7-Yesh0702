<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reflex Timer Game</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px; text-align: center; background-color: #f4f7f6; }
        .display-box { font-size: 2rem; margin: 20px; padding: 20px; border-radius: 10px; background: white; border: 1px solid #ccc; }
        .btn-custom { padding: 15px 40px; font-size: 1.2rem; margin: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="mb-4">Yeshwanth Reddy Kottam reflexes</h1>

        <div id="target" class="display-box">Your time</div>
        <div id="counter" class="display-box">Count</div>

        <button type="button" class="btn btn-success btn-custom" onclick="beginTime()">Go</button>
        <button type="button" class="btn btn-danger btn-custom" id="haltButton">Halt</button>
    </div>

    <script>
        var haltTime = undefined;

        function recordTime() {
            haltTime = Date.now();
        }

        document.getElementById("haltButton").onclick = recordTime;

        function beginTime() {
            haltTime = undefined; 
            
            // Bonus: Random start value between 2 and 10
            let countdownStart = Math.floor(Math.random() * 9) + 2;
            
            // Loop for countdown
            for (let i = 0; i <= countdownStart; i++) {
                setTimeout(function() {
                    document.getElementById("counter").innerHTML = (countdownStart - i);
                }, i * 1000);
            }

            // Final check after the randomized duration
            setTimeout(function() {
                if (haltTime === undefined) {
                    document.getElementById("target").innerHTML = "Not soon enough";
                } else {
                    let targetTime = Date.now();
                    let elapsed = targetTime - haltTime;
                    document.getElementById("target").innerHTML = "Time was " + elapsed + "ms";
                }
            }, countdownStart * 1000);
        }
    </script>
</body>
</html>
